# Self-review: run the agent on a PR of this repo, using a local Ollama model.
# Manual (workflow_dispatch) by default — running a local LLM in CI is slow and
# resource-heavy. Provide the PR URL as an input.
name: Self Review

on:
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Full GitHub PR URL to review"
        required: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Install + start Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 5
          ollama pull qwen2.5-coder:7b

      - name: Review the PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run arev review --pr "${{ github.event.inputs.pr_url }}" --post
